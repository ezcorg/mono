name: Build and publish witmproxy Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'witmproxy-v*'
    paths:
      - 'src/apps/witmproxy/**'
      - 'src/rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.dockerignore'
      - '.github/workflows/witmproxy-docker-publish.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional explicit image tag (in addition to the auto-generated ones)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ezcorg/witmproxy

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: [self-hosted, linux, theo-msi]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags produced:
      #   - branch name on main           → ghcr.io/<owner>/witmproxy:main
      #   - `latest` on default branch    → ghcr.io/<owner>/witmproxy:latest
      #   - semver from `witmproxy-v*`    → ghcr.io/<owner>/witmproxy:<version>
      #   - short sha for traceability    → ghcr.io/<owner>/witmproxy:sha-<short>
      #   - workflow_dispatch input tag   → ghcr.io/<owner>/witmproxy:<input>
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=match,pattern=witmproxy-v(.*),group=1
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/apps/witmproxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
