name: Publish witmproxy to crates.io

on:
  push:
    tags:
      - 'witmproxy-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.1)'
        required: true
        type: string
      dry_run:
        description: 'Perform a dry run (do not actually publish)'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check code formatting
        run: cargo fmt --package witmproxy --check

      - name: Run clippy lints
        run: cargo clippy --package witmproxy --all-targets --all-features -- -D warnings

      - name: Build witmproxy
        run: cargo build --package witmproxy --all-targets

      - name: Run tests
        run: cargo test --package witmproxy

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2, wasm32-unknown-unknown 

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Extract version from tag
        if: github.event_name == 'push'
        run: |
          # Extract version from tag (e.g., witmproxy-v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/witmproxy-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "Publishing version: ${{ github.event.inputs.version }}"

      - name: Update version in Cargo.toml
        run: |
          cd src/apps/witmproxy
          # Update the version in Cargo.toml
          sed -i 's/^version = ".*"/version = "'${{ env.VERSION }}'"/' Cargo.toml
          echo "Updated Cargo.toml version to ${{ env.VERSION }}"
          cat Cargo.toml | grep -E "^version"

      - name: Verify package can be built
        run: |
          cd src/apps/witmproxy
          cargo build --release

      - name: Verify package metadata
        run: |
          cd src/apps/witmproxy
          cargo package --list

      - name: Dry run publish (if enabled)
        if: github.event.inputs.dry_run == 'true'
        run: |
          cd src/apps/witmproxy
          cargo publish --dry-run

      - name: Publish to crates.io
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd src/apps/witmproxy
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: witmproxy-v${{ env.VERSION }}
          name: witmproxy v${{ env.VERSION }}
          body: |
            ## witmproxy v${{ env.VERSION }}

            Published to [crates.io](https://crates.io/crates/witmproxy/${{ env.VERSION }})

            ### Installation

            ```bash
            # Install from crates.io
            cargo install witmproxy@${{ env.VERSION }}

            # Or download a pre-built binary from the release assets below
            # and place it on your PATH as `witm`
            ```

            ### Changes

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/src/apps/witmproxy/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}

  build-release:
    name: Build release binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: publish
    if: github.event.inputs.dry_run != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: witm-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: witm-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: witm-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/witmproxy-v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version in Cargo.toml
        run: |
          cd src/apps/witmproxy
          sed -i'' -e 's/^version = ".*"/version = "'${{ env.VERSION }}'"/' Cargo.toml

      - name: Build release binary
        run: cargo build --package witmproxy --bin witm --release --target ${{ matrix.target }}

      - name: Rename binary to platform-specific name
        run: mv target/${{ matrix.target }}/release/witm target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: witmproxy-v${{ env.VERSION }}
          files: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          token: ${{ secrets.GITHUB_TOKEN }}

  generate-patches:
    name: Generate bidiff patches (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event.inputs.dry_run != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: witm-linux-x64
          - artifact: witm-macos-x64
          - artifact: witm-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install bidiff CLI
        run: cargo install bidiff

      - name: Extract current version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/witmproxy-v}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Find previous release tag
        id: prev
        run: |
          # List witmproxy version tags sorted by version, find the one before current
          PREV_TAG=$(git tag --list 'witmproxy-v*' --sort=-version:refname | grep -v "witmproxy-v${{ env.VERSION }}" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release tag found — skipping patch generation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            PREV_VERSION=${PREV_TAG#witmproxy-v}
            echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV
            echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Previous version: $PREV_VERSION ($PREV_TAG)"
          fi

      - name: Download current release binary
        if: steps.prev.outputs.skip != 'true'
        run: |
          gh release download "witmproxy-v${{ env.VERSION }}" \
            --pattern "${{ matrix.artifact }}" \
            --dir current/ \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download previous release binary
        if: steps.prev.outputs.skip != 'true'
        run: |
          gh release download "${{ env.PREV_TAG }}" \
            --pattern "${{ matrix.artifact }}" \
            --dir previous/ \
            --repo ${{ github.repository }} || echo "skip_patch=true" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate bidiff patch
        if: steps.prev.outputs.skip != 'true' && env.skip_patch != 'true'
        run: |
          PATCH_NAME="${{ matrix.artifact }}.bidiff-from-${{ env.PREV_VERSION }}"
          bidiff "previous/${{ matrix.artifact }}" "current/${{ matrix.artifact }}" "$PATCH_NAME"

          OLD_SIZE=$(stat -c%s "previous/${{ matrix.artifact }}")
          NEW_SIZE=$(stat -c%s "current/${{ matrix.artifact }}")
          PATCH_SIZE=$(stat -c%s "$PATCH_NAME")
          echo "Old: ${OLD_SIZE} bytes, New: ${NEW_SIZE} bytes, Patch: ${PATCH_SIZE} bytes ($(( PATCH_SIZE * 100 / NEW_SIZE ))%)"

          echo "PATCH_NAME=$PATCH_NAME" >> $GITHUB_ENV

      - name: Upload patch to release
        if: steps.prev.outputs.skip != 'true' && env.skip_patch != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: witmproxy-v${{ env.VERSION }}
          files: ${{ env.PATCH_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}